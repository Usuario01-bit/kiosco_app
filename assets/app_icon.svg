<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="50%" stop-color="#FF3C38"/>
      <stop offset="100%" stop-color="#A239EA"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#FF9F1C"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="20" y="20" width="472" height="472" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Kiosk body -->
  <rect x="120" y="220" width="272" height="200" rx="24" fill="white" opacity="0.95"/>
  <!-- Counter top -->
  <rect x="100" y="200" width="312" height="28" rx="14" fill="white"/>
  <!-- Awning stripes -->
  <rect x="120" y="140" width="272" height="70" rx="12" fill="url(#roof)"/>
  <rect x="155" y="140" width="1" height="70" fill="#E87A00" opacity="0.3"/>
  <rect x="190" y="140" width="1" height="70" fill="#E87A00" opacity="0.3"/>
  <rect x="225" y="140" width="1" height="70" fill="#E87A00" opacity="0.3"/>
  <rect x="260" y="140" width="1" height="70" fill="#E87A00" opacity="0.3"/>
  <rect x="295" y="140" width="1" height="70" fill="#E87A00" opacity="0.3"/>
  <rect x="330" y="140" width="1" height="70" fill="#E87A00" opacity="0.3"/>
  <rect x="365" y="140" width="1" height="70" fill="#E87A00" opacity="0.3"/>
  <!-- Shelf/display -->
  <rect x="148" y="250" width="216" height="8" rx="4" fill="#E0E0E0"/>
  <!-- Items on shelf -->
  <!-- Soda can -->
  <rect x="165" y="218" width="22" height="32" rx="6" fill="#FF6B35"/>
  <rect x="169" y="222" width="14" height="4" rx="2" fill="white" opacity="0.5"/>
  <!-- Ice cream cone -->
  <polygon points="215,250 207,218 223,218" fill="#FF9F1C"/>
  <circle cx="215" cy="214" r="10" fill="#FFD166"/>
  <circle cx="211" cy="212" r="4" fill="#FF6B35"/>
  <!-- Cookie -->
  <circle cx="260" cy="240" r="14" fill="#D4A574"/>
  <circle cx="255" cy="237" r="3" fill="#8B5E3C"/>
  <circle cx="264" cy="235" r="2" fill="#8B5E3C"/>
  <circle cx="258" cy="243" r="3" fill="#8B5E3C"/>
  <circle cx="265" cy="242" r="2" fill="#8B5E3C"/>
  <!-- Cupcake -->
  <rect x="296" y="228" width="24" height="22" rx="3" fill="#A239EA"/>
  <circle cx="308" cy="224" r="10" fill="#FFD166"/>
  <circle cx="308" cy="220" r="3" fill="#FF3C38"/>
  <!-- Window / opening -->
  <rect x="176" y="300" width="160" height="90" rx="16" fill="#1A1A2E" opacity="0.08"/>
  <!-- Price tag / accent -->
  <rect x="310" y="180" width="60" height="22" rx="11" fill="#FF3C38"/>
  <text x="340" y="195" text-anchor="middle" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">Kiosco</text>
  <!-- Decorative circles -->
  <circle cx="400" cy="100" r="16" fill="#FFD166" opacity="0.5"/>
  <circle cx="380" cy="120" r="8" fill="#FFD166" opacity="0.3"/>
  <circle cx="100" cy="380" r="12" fill="#FFD166" opacity="0.4"/>
</svg>
