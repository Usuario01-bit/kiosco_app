<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect x="20" y="20" width="472" height="472" rx="96" fill="#1A1A2E"/>
  <!-- Monoline kiosk - drawn with strokes -->
  <g fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Awning -->
    <path d="M80 170 L256 70 L432 170"/>
    <!-- Awning stripes (horizontal lines) -->
    <path d="M256 70 L256 170"/>
    <path d="M432 170 L376 170"/>
    <path d="M80 170 L136 170"/>
    <!-- Body -->
    <rect x="120" y="170" width="272" height="260" rx="16"/>
    <!-- Counter line -->
    <line x1="100" y1="200" x2="412" y2="200"/>
    <!-- Products on shelf -->
    <rect x="160" y="220" width="24" height="36" rx="4"/>
    <circle cx="220" cy="250" r="18"/>
    <rect x="280" y="230" width="20" height="26" rx="4"/>
    <circle cx="340" cy="245" r="16"/>
    <!-- Door -->
    <rect x="216" y="300" width="80" height="130" rx="8"/>
    <circle cx="276" cy="365" r="4"/>
    <!-- Sun/decoration -->
    <circle cx="400" cy="100" r="20" stroke-width="4"/>
    <line x1="400" y1="70" x2="400" y2="60"/>
    <line x1="400" y1="130" x2="400" y2="140"/>
    <line x1="370" y1="100" x2="360" y2="100"/>
    <line x1="430" y1="100" x2="440" y2="100"/>
  </g>
</svg>
